<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <clipPath id="c">
      <rect x="6" y="6" width="88" height="88" rx="9"/>
    </clipPath>
  </defs>
  <!-- White fill inside rounded frame -->
  <rect x="6" y="6" width="88" height="88" rx="9" fill="white"/>
  <!-- Top-left filled triangle (Z negative-space mark) -->
  <polygon points="6,6 60,6 6,54" fill="#236B56" clip-path="url(#c)"/>
  <!-- Bottom-right filled triangle -->
  <polygon points="94,46 94,94 40,94" fill="#236B56" clip-path="url(#c)"/>
  <!-- Rounded rectangle frame -->
  <rect x="6" y="6" width="88" height="88" rx="9" stroke="#236B56" stroke-width="4.5"/>
</svg>
