name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm build --filter=@repo/web

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('**/package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm playwright:install

      - name: Build web app
        run: pnpm build --filter=@repo/web
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          BETTER_AUTH_SECRET: ci-test-secret-not-real
          BETTER_AUTH_URL: http://localhost:3003
          NEXT_PUBLIC_APP_URL: http://localhost:3003

      - name: Run database migrations
        run: pnpm --filter=@repo/db db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

      - name: Start web server
        run: pnpm --filter @repo/web start &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          BETTER_AUTH_SECRET: ci-test-secret-not-real
          BETTER_AUTH_URL: http://localhost:3003
          NEXT_PUBLIC_APP_URL: http://localhost:3003

      - name: Wait for server
        # Use tcp: not http: — avoids false negatives from redirect/500 responses
        run: npx wait-on tcp:localhost:3003 --timeout 60000

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3003
          CI: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          BETTER_AUTH_SECRET: ci-test-secret-not-real
          BETTER_AUTH_URL: http://localhost:3003
          NEXT_PUBLIC_APP_URL: http://localhost:3003

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
